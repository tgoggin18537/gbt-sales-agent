name = "gbt-spiffy"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Defaults. Override per-env below.
[vars]
SPIFFY_MODEL = "claude-sonnet-4-6"
# Public URL of this worker. The debounce alarm hands the drain off to a fresh
# worker invocation here (a DO cannot fetch itself without deadlocking).
WORKER_SELF_URL = "https://gbt-spiffy.gobluetours.workers.dev"
# Debounce "wait step": "1" collects rapid-fire texts and answers once after
# the lead stops typing. Unset/"0" = legacy synchronous reply (no change).
# Left OFF here; flip on per-env or via `wrangler secret`/dashboard after smoke.
# DEBOUNCE_ENABLED = "1"

# Secrets (set with `wrangler secret put NAME`):
#   ANTHROPIC_API_KEY
#   GHL_API_KEY
#   GHL_LOCATION_ID
#   GHL_WEBHOOK_SECRET
#   INTERNAL_DRAIN_SECRET   (guards /internal/drain; the DO alarm sends it)

# Durable Object: per-contact conversation thread.
[[durable_objects.bindings]]
name = "CONTACT_THREAD"
class_name = "ContactThread"

[[migrations]]
tag = "v1"
# new_sqlite_classes is required on the Workers free plan. Stick with this
# even if you upgrade — SQLite-backed DOs are the new default.
new_sqlite_classes = ["ContactThread"]

# KV for webhook idempotency. Create with:
#   wrangler kv:namespace create IDEMPOTENCY
# then paste the id here.
# [[kv_namespaces]]
# binding = "IDEMPOTENCY"
# id = "REPLACE_ME"

# D1 for analytics. Create with:
#   wrangler d1 create gbt_spiffy
# then paste the database_id here.
# [[d1_databases]]
# binding = "DB"
# database_name = "gbt_spiffy"
# database_id = "REPLACE_ME"
# migrations_dir = "src/db"

[env.staging]
name = "gbt-spiffy-staging"

[env.production]
name = "gbt-spiffy"
